version: "3"
services:
  # vector database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    volumes:
      - /opt/supportai/qdrant_storage:/qdrant/storage
    ports:
      - "6333:6333"
    restart: unless-stopped

  # application
  search-service:
    image: naumen-support/sherlock:1.0.0
    container_name: Sherlock
    volumes:
      - /opt/supportai/sherlock/config/config.yaml:/app/search_service/config.yaml
    ports:
      - "5000:5000"
    command: uvicorn app:app --workers 1 --host 0.0.0.0 --port 5000
    restart: unless-stopped