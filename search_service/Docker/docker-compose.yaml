version: "3.9"
services:
  # vector database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    volumes:
      - /opt/supportai/qdrant_storage:/qdrant/storage
    ports:
      - "6333:6333"
    restart: unless-stopped

  # application
  sherlock:
    image: naumen-support/
    container_name: Sherlock
    volumes:
      - /opt/supportai/sherlock/config/config.yaml:/app/search_service/config.yaml
    ports:
      - "5000:5000"
    command: uvicorn search_service.app:app --host 0.0.0.0 --port 5000
    restart: unless-stopped