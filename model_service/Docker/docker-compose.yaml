version: "3.9"

services:
  athena:
    build: .
    image: naumen-support/athena:1.0.0
    container_name: Athena
    ports:
      - "50051:50051"
    volumes:
      - /opt/supportai/athena/models:/app/model_service/models
      - /opt/supportai/athena/config.yaml:/app/model_service/config.yaml
    restart: always